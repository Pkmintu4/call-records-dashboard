services:
  - type: web
    name: call-records-dashboard
    runtime: docker
    dockerContext: .
    dockerfilePath: ./backend/Dockerfile
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: prod
      - key: DATABASE_URL
        fromDatabase:
          name: call-records-db
          property: connectionString
      - key: OPENAI_MODEL
        value: gpt-4.1-mini
      - key: AUTO_INGEST_ENABLED
        value: "false"
      - key: CORS_ORIGINS
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REFRESH_TOKEN
        sync: false
      - key: GOOGLE_DRIVE_FOLDER_ID
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
      - key: OPENAI_API_KEY
        sync: false

databases:
  - name: call-records-db
    databaseName: call_records
    user: call_records_user
